<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minha Biblioteca - Atlantida Store</title>
    <link rel="stylesheet" href="/styles.css?v=2">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/">Atlantida Store</a>
            <nav class="nav">
                <a href="/">Feed</a>
                <a href="/perfil">Perfil</a>
                <a href="/biblioteca">Minha Biblioteca</a>
                <a href="/lista-desejos">Lista de desejos</a>
                <a class="button small" href="/publicar-jogo">Publicar Jogo</a>
                <button class="danger small" id="logoutButton" type="button">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-title">
            <div>
                <h1>Minha Biblioteca</h1>
                <p>Jogos adicionados à sua conta.</p>
            </div>
            <p id="mensagem" class="mensagem" role="status"></p>
        </section>

        <section class="panel">
            <div id="bibliotecaLista" class="game-grid">
                <p class="empty">Carregando biblioteca...</p>
            </div>
        </section>
    </main>

    <script src="/biblioteca.js?v=2"></script>
</body>
</html>
