<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="container narrow">
        <section class="panel">
            <div class="header">
                <div>
                    <h1>Cadastro</h1>
                    <p>Crie uma conta para acessar a plataforma.</p>
                </div>
            </div>

            <form id="cadastroForm" class="form single">
                <label>
                    Nome
                    <input id="nome" name="nome" type="text" autocomplete="name" required>
                </label>

                <label>
                    E-mail
                    <input id="email" name="email" type="email" autocomplete="email" required>
                </label>

                <label>
                    Senha
                    <div class="senha-wrapper">
                        <input id="senha" name="senha" type="password" autocomplete="new-password" minlength="6" required>
                        <button type="button" class="toggle-senha" id="toggleSenha" aria-label="Mostrar senha"></button>
                    </div>
                </label>

                <button type="submit">Cadastrar</button>
            </form>

            <p id="mensagem" class="mensagem" role="status"></p>

            <p class="footer-link">
                Já tem conta? <a href="/login">Entrar</a>
            </p>
        </section>
    </main>

    <script src="/cadastro.js"></script>
</body>
</html>
