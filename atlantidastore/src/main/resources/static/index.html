<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuários</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="container">
        <section class="panel">
            <div class="header">
                <div>
                    <h1>Usuários cadastrados</h1>
                    <p id="usuarioLogado">Carregando sessão...</p>
                </div>
                <div class="actions">
                    <a class="button secondary" href="/cadastro">Cadastrar</a>
                    <button class="secondary" id="imprimirButton" type="button">Imprimir</button>
                    <button class="danger" id="logoutButton" type="button">Sair</button>
                </div>
            </div>

            <p id="mensagem" class="mensagem" role="status"></p>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Criado em</th>
                            <th class="acoes">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosTabela">
                        <tr>
                            <td colspan="4">Carregando usuários...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
