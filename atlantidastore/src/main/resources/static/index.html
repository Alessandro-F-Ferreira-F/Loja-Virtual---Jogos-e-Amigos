<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Usuários</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="container">
        <section class="panel">
            <div class="header">
                <div>
                    <h1>Cadastro de Usuários</h1>
                    <p>Cadastre, consulte, remova e imprima usuários.</p>
                </div>
                <button class="secondary" id="imprimirButton" type="button">Imprimir</button>
            </div>

            <form id="usuarioForm" class="form">
                <label>
                    Nome
                    <input id="nome" name="nome" type="text" autocomplete="name" required>
                </label>

                <label>
                    E-mail
                    <input id="email" name="email" type="email" autocomplete="email" required>
                </label>

                <button type="submit">Cadastrar</button>
            </form>

            <p id="mensagem" class="mensagem" role="status"></p>
        </section>

        <section class="panel">
            <div class="header">
                <h2>Usuários</h2>
                <button class="secondary" id="atualizarButton" type="button">Atualizar</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Criado em</th>
                            <th class="acoes">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usuariosTabela">
                        <tr>
                            <td colspan="4">Carregando usuários...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
