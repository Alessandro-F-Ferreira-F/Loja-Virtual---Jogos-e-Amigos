<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atlantida Store</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/">Atlantida Store</a>
            <nav class="nav">
                <a href="/perfil">Perfil</a>
                <a href="/biblioteca">Minha Biblioteca</a>
                <a class="button small" href="/publicar-jogo">Publicar Jogo</a>
                <button class="danger small" id="logoutButton" type="button">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-title">
            <div>
                <h1>Feed de jogos</h1>
                <p id="usuarioLogado">Carregando sessão...</p>
            </div>
            <p id="mensagem" class="mensagem" role="status"></p>
        </section>

        <section class="panel">
            <div class="header">
                <div>
                    <h2>Publicados recentemente</h2>
                    <p>Jogos ordenados pela data de publicação.</p>
                </div>
            </div>

            <div id="feedLista" class="game-grid">
                <p class="empty">Carregando jogos...</p>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
