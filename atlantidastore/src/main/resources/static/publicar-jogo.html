<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Publicar Jogo - Atlantida Store</title>
    <link rel="stylesheet" href="/styles.css?v=2">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/">Atlantida Store</a>
            <nav class="nav">
                <a href="/">Feed</a>
                <a href="/biblioteca">Minha Biblioteca</a>
                <a href="/lista-desejos">Lista de desejos</a>
                <a class="button small" href="/publicar-jogo">Publicar Jogo</a>
                <button class="danger small" id="logoutButton" type="button">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-title">
            <div>
                <h1>Publicar Jogo</h1>
                <p id="usuarioLogado">Carregando sessão...</p>
            </div>
            <p id="mensagem" class="mensagem" role="status"></p>
        </section>

        <section class="panel">
            <form id="jogoForm" class="form publish-form">
                <label>
                    Nome
                    <input id="jogoNome" name="nome" type="text" required>
                </label>

                <label>
                    Preço
                    <input id="jogoPreco" name="preco" type="text" placeholder="R$ 0,00" required>
                </label>

                <div class="span-2" style="display: grid; gap: 6px;">
                    <label>Tags</label>
                    <div class="multi-select" id="jogoTagsSelect">
                        <button type="button" class="multi-select-trigger" id="jogoTagsTrigger">
                            <span class="multi-select-value" id="jogoTagsValue">Selecione as categorias...</span>
                            <span class="multi-select-arrow">▼</span>
                        </button>
                        <div class="multi-select-dropdown" id="jogoTagsDropdown">
                            <label class="multi-select-option"><input type="checkbox" value="Ação"> Ação</label>
                            <label class="multi-select-option"><input type="checkbox" value="Aventura"> Aventura</label>
                            <label class="multi-select-option"><input type="checkbox" value="Casual"> Casual</label>
                            <label class="multi-select-option"><input type="checkbox" value="Esportes"> Esportes</label>
                            <label class="multi-select-option"><input type="checkbox" value="Estratégia"> Estratégia</label>
                            <label class="multi-select-option"><input type="checkbox" value="Indie"> Indie</label>
                            <label class="multi-select-option"><input type="checkbox" value="RPG"> RPG</label>
                            <label class="multi-select-option"><input type="checkbox" value="Simulação"> Simulação</label>
                        </div>
                    </div>
                </div>

                <label class="span-2">
                    Capa
                    <input id="jogoImagem" name="imagem" type="file" accept="image/*">
                </label>

                <div class="cover-preview span-2">
                    <img id="imagemPreview" alt="Preview da capa">
                    <span id="previewPlaceholder">Sem capa selecionada</span>
                </div>

                <label class="span-2">
                    Arquivo do jogo (.zip)
                    <input id="jogoArquivo" name="arquivo" type="file" accept=".zip,application/zip,application/x-zip-compressed" required>
                </label>

                <p class="field-hint span-2" id="arquivoSelecionado">Selecione um arquivo ZIP com a build do jogo.</p>

                <label class="span-2">
                    Descrição
                    <textarea id="jogoDescricao" name="descricao" rows="4" required></textarea>
                </label>

                <div class="form-actions span-2">
                    <a class="button secondary" href="/">Cancelar</a>
                    <button type="submit">Publicar jogo</button>
                </div>
            </form>
        </section>
    </main>

    <script src="/publicar-jogo.js?v=2"></script>
</body>
</html>
